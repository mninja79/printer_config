########################################
# TMC2209 configuration
########################################
[tmc2209 stepper_x]
uart_pin: P1.10
interpolate: True
run_current: 0.900
diag_pin: P1.29
driver_SGTHRS: 106
sense_resistor: 0.110
stealthchop_threshold: 350

[tmc2209 stepper_y]
