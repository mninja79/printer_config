stealthchop_threshold: 350

[tmc2209 stepper_z]
uart_pin: P1.8
interpolate: True
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 50

[tmc2209 stepper_z1]
uart_pin: P1.1
interpolate: True
run_current: 0.800
sense_resistor: 0.110
stealthchop_threshold: 50

[tmc2209 extruder]
uart_pin: P1.4
interpolate: True
run_current: 0.900
sense_resistor: 0.110
stealthchop_threshold: 350


